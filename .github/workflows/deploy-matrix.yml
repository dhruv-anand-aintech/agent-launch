name: Deploy compare matrix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-matrix.yml"
      - "docs/tools/agent_matrix/**"
      - "scripts/generate_matrix_changelog.py"
      - "worker/matrix.js"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      - run: npm run matrix:validate
      - run: npm run matrix:bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run matrix:llms-txt
      - run: npm run matrix:changelog
      - name: Verify committed changelog is current
        run: git diff --exit-code -- docs/tools/agent_matrix/changelog.json

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --config wrangler.toml
